<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#37003c"/>
      <stop offset="0.55" stop-color="#4b0a52"/>
      <stop offset="1" stop-color="#1a0020"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00ff85"/>
      <stop offset="1" stop-color="#04f5ff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="18" fill="url(#bg)"/>

  <!-- pitch lines motif -->
  <g stroke="#ffffff" stroke-opacity="0.06" fill="none" stroke-width="2">
    <circle cx="1050" cy="160" r="120"/>
    <line x1="1050" y1="20" x2="1050" y2="300"/>
    <rect x="930" y="70" width="120" height="180"/>
  </g>
  <circle cx="1050" cy="160" r="7" fill="#00ff85" filter="url(#glow)"/>

  <!-- accent bar -->
  <rect x="60" y="70" width="6" height="180" rx="3" fill="url(#accent)"/>

  <!-- title -->
  <text x="90" y="118" fill="#ffffff" font-size="46" font-weight="800">Premier League</text>
  <text x="90" y="168" fill="url(#accent)" font-size="46" font-weight="800" filter="url(#glow)">Match Prediction &amp; Analysis</text>
  <text x="92" y="205" fill="#e6d5ea" font-size="20" font-weight="500">Feltáró adatelemzés &amp; gépi tanulás · 10 szezon (2015/16 – 2024/25)</text>

  <!-- stat chips -->
  <g font-size="15" font-weight="700">
    <rect x="92"  y="238" width="150" height="46" rx="10" fill="#ffffff" fill-opacity="0.08" stroke="#00ff85" stroke-opacity="0.5"/>
    <text x="167" y="260" fill="#00ff85" text-anchor="middle">~3 800</text>
    <text x="167" y="277" fill="#c9b6cf" text-anchor="middle" font-size="12" font-weight="500">mérkőzés</text>

    <rect x="254" y="238" width="150" height="46" rx="10" fill="#ffffff" fill-opacity="0.08" stroke="#04f5ff" stroke-opacity="0.5"/>
    <text x="329" y="260" fill="#04f5ff" text-anchor="middle">5 hipotézis</text>
    <text x="329" y="277" fill="#c9b6cf" text-anchor="middle" font-size="12" font-weight="500">tesztelve</text>

    <rect x="416" y="238" width="170" height="46" rx="10" fill="#ffffff" fill-opacity="0.08" stroke="#e90052" stroke-opacity="0.6"/>
    <text x="501" y="260" fill="#ff4d8d" text-anchor="middle">Random Forest</text>
    <text x="501" y="277" fill="#c9b6cf" text-anchor="middle" font-size="12" font-weight="500">Optuna-hangolással</text>
  </g>

  <!-- Önlab tag -->
  <text x="90" y="52" fill="#00ff85" font-size="15" font-weight="700" letter-spacing="3">ÖNÁLLÓ LABORATÓRIUM · BME VIK</text>
</svg>
