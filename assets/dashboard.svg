<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="170" viewBox="0 0 1200 170" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="cardg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a0030"/>
      <stop offset="1" stop-color="#160019"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00ff85"/><stop offset="1" stop-color="#04f5ff"/>
    </linearGradient>
    <filter id="g2" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 4 stat cards -->
  <g>
    <!-- card template positions: x = 0,300,600,900 (width 280, gap 20) -->
    <g transform="translate(0,10)">
      <rect width="280" height="150" rx="16" fill="url(#cardg)" stroke="#00ff85" stroke-opacity="0.35"/>
      <text x="140" y="58" text-anchor="middle" fill="#00ff85" font-size="52" font-weight="800" filter="url(#g2)">10</text>
      <text x="140" y="92" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">szezon</text>
      <text x="140" y="118" text-anchor="middle" fill="#b79cbe" font-size="13">2015/16 – 2024/25</text>
    </g>
    <g transform="translate(300,10)">
      <rect width="280" height="150" rx="16" fill="url(#cardg)" stroke="#04f5ff" stroke-opacity="0.35"/>
      <text x="140" y="58" text-anchor="middle" fill="#04f5ff" font-size="52" font-weight="800" filter="url(#g2)">~3 800</text>
      <text x="140" y="92" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">mérkőzés</text>
      <text x="140" y="118" text-anchor="middle" fill="#b79cbe" font-size="13">elemezve &amp; tisztítva</text>
    </g>
    <g transform="translate(600,10)">
      <rect width="280" height="150" rx="16" fill="url(#cardg)" stroke="#e90052" stroke-opacity="0.5"/>
      <text x="140" y="58" text-anchor="middle" fill="#ff4d8d" font-size="52" font-weight="800" filter="url(#g2)">5</text>
      <text x="140" y="92" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">hipotézis</text>
      <text x="140" y="118" text-anchor="middle" fill="#b79cbe" font-size="13">megfogalmazva &amp; tesztelve</text>
    </g>
    <g transform="translate(900,10)">
      <rect width="280" height="150" rx="16" fill="url(#cardg)" stroke="#00ff85" stroke-opacity="0.55"/>
      <text x="140" y="58" text-anchor="middle" fill="url(#mint)" font-size="52" font-weight="800" filter="url(#g2)">50,9%</text>
      <text x="140" y="92" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">végső pontosság</text>
      <text x="140" y="118" text-anchor="middle" fill="#b79cbe" font-size="13">Random Forest + Optuna</text>
    </g>
  </g>
</svg>
