<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360" viewBox="0 0 1000 360" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f0024"/><stop offset="1" stop-color="#12001a"/>
    </linearGradient>
    <linearGradient id="win" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00cf6a"/><stop offset="1" stop-color="#00ff85"/>
    </linearGradient>
    <linearGradient id="feat" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0699b9"/><stop offset="1" stop-color="#04f5ff"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="360" rx="16" fill="url(#bgc)"/>
  <text x="40" y="46" fill="#ffffff" font-size="24" font-weight="800">Modellek pontossága</text>
  <text x="40" y="70" fill="#b79cbe" font-size="14">Teszthalmazon mért Accuracy — 3 kimenetel (H/D/A)</text>

  <!-- scale grid: 0% at x=300, 60% at x=940 => 10.667 px/% -->
  <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="1">
    <line x1="300" y1="95" x2="300" y2="330"/>
    <line x1="513.3" y1="95" x2="513.3" y2="330"/>
    <line x1="726.7" y1="95" x2="726.7" y2="330"/>
    <line x1="940" y1="95" x2="940" y2="330"/>
  </g>
  <g fill="#7d6684" font-size="11" text-anchor="middle">
    <text x="300" y="348">0%</text><text x="513.3" y="348">20%</text>
    <text x="726.7" y="348">40%</text><text x="940" y="348">60%</text>
  </g>
  <!-- random baseline marker at 33.3% => x=300+33.3*10.667=655.2 -->
  <line x1="655.2" y1="95" x2="655.2" y2="330" stroke="#ff4d8d" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="655.2" y="112" fill="#ff4d8d" font-size="11" text-anchor="middle">véletlen 33%</text>

  <!-- bars: y start 128, step 44, height 26 -->
  <g font-size="14" font-weight="600">
    <!-- 1 Véletlen tippelés 33.3 -->
    <text x="284" y="146" fill="#c9b6cf" text-anchor="end">Véletlen tippelés</text>
    <rect x="300" y="130" width="355.2" height="26" rx="5" fill="#5a4463"/>
    <text x="663" y="149" fill="#c9b6cf">33,3%</text>
    <!-- 2 Naiv mindig hazai 44.5 -->
    <text x="284" y="190" fill="#c9b6cf" text-anchor="end">Naiv „mindig hazai"</text>
    <rect x="300" y="174" width="474.7" height="26" rx="5" fill="#6b4f76"/>
    <text x="783" y="193" fill="#c9b6cf">44,5%</text>
    <!-- 3 Csak piros lapok 44.5 -->
    <text x="284" y="234" fill="#c9b6cf" text-anchor="end">Csak piros lapok</text>
    <rect x="300" y="218" width="474.7" height="26" rx="5" fill="#6b4f76"/>
    <text x="783" y="237" fill="#c9b6cf">44,5%</text>
    <!-- 4 Csak Form_Diff 49.4 -->
    <text x="284" y="278" fill="#04f5ff" text-anchor="end">Csak Form_Diff (saját)</text>
    <rect x="300" y="262" width="526.9" height="26" rx="5" fill="url(#feat)"/>
    <text x="835" y="281" fill="#04f5ff">49,4%</text>
    <!-- 5 Végső hibrid modell 50.9 -->
    <text x="284" y="322" fill="#00ff85" text-anchor="end" font-weight="800">Végső hibrid modell</text>
    <rect x="300" y="306" width="542.9" height="26" rx="5" fill="url(#win)"/>
    <text x="851" y="325" fill="#00ff85" font-weight="800">50,9%</text>
  </g>
</svg>
